name: CI - 代码质量检查 & 自动测试

# 触发条件：push 到 sprint2-dev 或 PR 指向 sprint2-dev
on:
  push:
    branches: [sprint2-dev]
  pull_request:
    branches: [sprint2-dev]

jobs:
  lint:
    name: 代码质量检查 (Ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check bot/ --output-format=github

      - name: Run ruff format check
        run: ruff format bot/ --check --diff

  test:
    name: 自动化测试 (Pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r bot/requirements.txt
          pip install pytest pytest-asyncio

      - name: Create minimal .env for tests
        run: |
          cat > bot/.env << 'EOF'
          LLM=gemini
          GEMINI_API_KEY=test_key_not_real
          TELEGRAM_BOT_TOKEN=000000000:AAAAAAAAAAAAAAAAAAAAAAtest
          ADMIN_TELEGRAM_IDS=123456789
          WHITELIST_ENABLED=false
          PAUSE_PUSH=true
          EOF

      - name: Run tests
        working-directory: bot
        run: python -m pytest tests/ -v --tb=short

  summary:
    name: CI 结果汇总
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.lint.result }}" = "success" ] && [ "${{ needs.test.result }}" = "success" ]; then
            echo "✅ 所有检查通过！代码质量和测试均正常。"
          else
            echo "❌ 存在失败项："
            echo "  - Lint: ${{ needs.lint.result }}"
            echo "  - Test: ${{ needs.test.result }}"
            exit 1
          fi
