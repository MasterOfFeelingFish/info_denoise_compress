services:
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: web3-digest-bot
    restart: unless-stopped
    env_file:
      - ./bot/.env
    volumes:
      - ./data:/app/data
      - ./bot:/app
      - ./CHANGELOG.md:/app/CHANGELOG.md:ro
    networks:
      - web3-digest
      - rsshub_default

networks:
  web3-digest:
    driver: bridge
  rsshub_default:
    external: true
